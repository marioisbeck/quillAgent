# Local pre-commit hook config for quillAgent.
#
# Laptop-side complement to .github/workflows/security.yml — same
# gitleaks scan, runs on `git commit` so secrets never leave the
# working tree.
#
# Setup (one-time per clone):
#   pip install pre-commit
#   pre-commit install
#
# Run on demand:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending
        args: [--fix=lf]
