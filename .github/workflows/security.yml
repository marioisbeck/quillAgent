name: security

# Continuous secret + SAST + dependency scans for quillAgent.
#
# This is the GitHub-side complement to the local nightly launchd job
# (`quillServer/scripts/security/quill-scan-local.sh`, Phase B Tier 1
# B1.2/B1.3/B1.4). CI catches what the local job misses: PRs from a
# clean clone, pushes from another machine, and the very first push of
# a new branch.
#
# Three jobs:
#   - gitleaks      on every push and PR (fast; consumes baseline)
#   - osv-scanner   on PRs and the daily schedule (lockfile changes)
#   - semgrep       on PRs and the daily schedule (slower SAST)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '23 6 * * *'

permissions:
  contents: read
  # gitleaks-action@v2 needs PR access to list commits and post comments.
  pull-requests: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository (full history for git-history scan)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action@v2 requires GITHUB_TOKEN to scan PRs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
          GITLEAKS_BASELINE_PATH: .gitleaks/baseline.json

  osv-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # Install osv-scanner from the upstream release binary.
      # `--recursive` walks the workspace and finds backend/, quill-agent/,
      # shared/ lockfiles via the root package-lock.json.
      - name: Install osv-scanner
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
            -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --version

      - name: Run osv-scanner (report all; fail only on High/Critical)
        # osv-scanner exits non-zero on ANY advisory regardless of severity,
        # which made the daily schedule fail on low-severity, often dev-only
        # advisories (e.g. newly-published GHSAs against build tooling). We
        # scan once to JSON, print every finding for visibility, then fail
        # the job only on High/Critical: CVSS base score >= 7.0 OR a GHSA
        # "HIGH"/"CRITICAL" label (covers advisories with no CVSS vector).
        # osv-scanner v2 dropped --skip-git; --recursive still walks subpaths.
        run: |
          set -uo pipefail
          ./osv-scanner --recursive --format json --output osv-results.json ./
          rc=$?
          if [ "$rc" -gt 1 ]; then
            echo "::error::osv-scanner failed to run (exit $rc)"
            exit "$rc"
          fi
          if [ ! -s osv-results.json ]; then
            echo "::error::osv-scanner produced no output"
            exit 1
          fi
          echo "----- advisories found (any severity) -----"
          jq -r '.results[].packages[]
                 | .package.name as $n | .package.version as $v
                 | (.groups[]? | "\($n)@\($v)  CVSS=\(.max_severity // "n/a")  \(.ids | join(","))")' \
            osv-results.json || true
          echo "-------------------------------------------"
          high=$(jq '
            ([ .results[].packages[].groups[]?.max_severity
               | select(. != null and . != "") | tonumber | select(. >= 7.0) ] | length)
            + ([ .results[].packages[].vulnerabilities[]?.database_specific.severity
                 | select(. != null) | ascii_upcase | select(. == "HIGH" or . == "CRITICAL") ] | length)
          ' osv-results.json)
          if ! printf '%s' "$high" | grep -qE '^[0-9]+$'; then
            echo "::error::failed to evaluate osv-scanner severity gate"
            exit 1
          fi
          echo "High/Critical findings: $high"
          if [ "$high" -gt 0 ]; then
            echo "::error::osv-scanner found High/Critical vulnerabilities (see list above)"
            exit 1
          fi
          echo "No High/Critical advisories; lower-severity findings (if any) are non-blocking."

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run semgrep CI
        env:
          SEMGREP_RULES: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/nodejsscan
        run: semgrep ci --config=auto
